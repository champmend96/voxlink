# VoxLink TURN Server Configuration (coturn)

# Listening port for STUN/TURN
listening-port=3478

# External IP (set to your server's public IP in production)
# external-ip=YOUR_PUBLIC_IP

# Relay ports range
min-port=49152
max-port=65535

# Authentication realm
realm=voxlink.local

# Long-term credential mechanism
lt-cred-mech

# Static user credentials (override with env vars in production)
user=voxlink:voxlink-turn-password

# Logging
log-file=/var/log/turnserver/turnserver.log
verbose

# Fingerprint for STUN messages
fingerprint

# Disable TCP relay (use UDP only for media)
no-tcp-relay

# Deny specific IP ranges for security
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=::1

# TLS (uncomment and configure for production)
# cert=/etc/ssl/certs/turn_server_cert.pem
# pkey=/etc/ssl/private/turn_server_pkey.pem
# tls-listening-port=5349
