version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: voxlink
      POSTGRES_PASSWORD: voxlink
      POSTGRES_DB: voxlink
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  coturn:
    image: coturn/coturn
    network_mode: host
    volumes:
      - ./server/config/turnserver.conf:/etc/turnserver.conf:ro
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "49152-65535:49152-65535/udp"
    restart: unless-stopped

volumes:
  pgdata:
